version: 2
updates:
  # npm依存関係（package.json / package-lock.json）
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    # PRノイズを減らすためのグルーピング（重要）
    groups:
      # マイナー・パッチアップデートをまとめて1つのPRに
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      # ESLint関連はまとめる
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "@typescript-eslint/*"
      # Vite関連もまとめる
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
    # メジャーアップデートは個別PRで慎重に確認する
    # （上のグループにmajorを含めていないので自動的にそうなる）

  # GitHub Actions のバージョン
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns:
          - "*"
