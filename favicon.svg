<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <!-- 背景円 -->
  <circle cx="60" cy="60" r="60" fill="#0f172a"/>
  <!-- 大きな吹き出し（左・青） -->
  <rect x="12" y="18" width="68" height="44" rx="10" fill="url(#g1)"/>
  <polygon points="22,62 14,76 36,62" fill="url(#g1)"/>
  <!-- 小さな吹き出し（右・オレンジ） -->
  <rect x="40" y="44" width="68" height="44" rx="10" fill="url(#g2)"/>
  <polygon points="90,88 108,100 80,88" fill="url(#g2)"/>
  <!-- 点々（大吹き出し） -->
  <circle cx="30" cy="40" r="5" fill="white" opacity="0.9"/>
  <circle cx="46" cy="40" r="5" fill="white" opacity="0.9"/>
  <circle cx="62" cy="40" r="5" fill="white" opacity="0.9"/>
  <!-- 点々（小吹き出し） -->
  <circle cx="56" cy="66" r="5" fill="white" opacity="0.9"/>
  <circle cx="72" cy="66" r="5" fill="white" opacity="0.9"/>
  <circle cx="88" cy="66" r="5" fill="white" opacity="0.9"/>
</svg>
